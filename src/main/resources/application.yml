spring:
  application:
    name: market_be

  datasource:
    url: ${RDS_DB_URL}
    username: ${RDS_DB_USERNAME}
    password: ${RDS_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  servlet:
    multipart:
      max-file-size: 1000MB       # 단일 파일 최대 크기
      max-request-size: 1000MB    # 전체 요청 최대 크기

server:
  port: ${PORT:8080}